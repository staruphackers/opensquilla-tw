host = "127.0.0.1"
port = 18790
version = "0.1.0"
debug = false
log_file_enabled = true
log_level = "DEBUG"
log_file_max_bytes = 5000000
log_file_backup_count = 3
workspace_dir = "/home/dummyuser/.opensquilla/workspace"
bootstrap_max_chars = 20000
bootstrap_total_max_chars = 50000
diagnostics_enabled = false
context_budget_tokens = 100000
context_overflow_policy = "auto_summarize"
preflight_compact_ratio = 0.85
agent_max_iterations = 100
llm_request_timeout_seconds = 120.0
agent_stream_heartbeat_interval_seconds = 15.0
agent_stream_idle_timeout_seconds = 180.0
webui_stream_idle_grace_seconds = 210.0
client_ws_keepalive_timeout_s = 120.0
ws_writer_queue_enabled = true
ws_writer_queue_maxsize = 512
search_provider = "duckduckgo"
search_api_key = ""
search_max_results = 5
search_proxy = ""
search_use_env_proxy = false
search_fallback_policy = "off"
search_diagnostics = false
state_dir = "/home/dummyuser/.opensquilla/state"

[auth]
mode = "none"
token_scopes = [
    "operator.admin",
]
allowed_roles = [
    "operator",
    "node",
]

[cors]
allowed_origins = [
    "*",
]
allow_credentials = true
allowed_methods = [
    "*",
]
allowed_headers = [
    "*",
]

[attachments]
persist_transcripts = true
transcript_disk_budget_bytes = 2147483648
artifact_max_bytes = 31457280
artifact_disk_budget_bytes = 536870912

[rate_limit]
enabled = true
max_requests = 100
window_seconds = 60

[tools]
allow = []
deny = []
also_allow = []
trusted_fake_ip_cidrs = []

[task_runtime]
max_concurrency = 4
max_pending_per_session = 64
channel_inflight_cap = 8

[skills]
allow_bundled = true
extra_dirs = []
max_skills_prompt_chars = 8000
filter_enabled = false
filter_top_k = 5
injection_mode = "system"
filter_strategy = "lexical"
filter_lexical_top_n = 20
filter_semantic_top_n = 20
filter_rrf_k = 60
filter_embedding_model = "BAAI/bge-small-zh-v1.5"

[llm]
provider = "openrouter"
model = "deepseek/deepseek-v4-flash"
api_key = ""
base_url = "https://openrouter.ai/api/v1"
proxy = ""
max_tokens = 0

[llm.provider_routing]

[prompt_cache]
mode = "auto"

[safety]
wrap_untrusted_workspace = true
injection_scan_mode = "report"

[prompt]
platform_hint_enabled = true

[memory]
source = "workspace"
retrieval_mode = "hybrid"
sync_interval_minutes = 0.0
inject_limit = 4000
max_file_size_kb = 1024
max_total_size_kb = 102400
max_files = 500
entry_ttl_days = 0
ttl_sweep_interval_minutes = 60.0
flush_enabled = true
flush_timeout_seconds = 5.0
flush_backoff_initial_seconds = 30.0
flush_backoff_max_seconds = 300.0
flush_archive_max_bytes = 800000
auto_capture_enabled = true
capture_mode = "archive_turn_pair"
capture_user = true
capture_assistant = false
index_captured_turns = false
capture_excluded_run_kinds = [
    "recall",
    "session_recall",
]
capture_excluded_provenance_kinds = [
    "recall",
    "tool_result",
    "memory_injected",
    "internal_system",
]
capture_max_chars = 2000
capture_roll_max_chars = 50000
prefetch_enabled = false
prefetch_max_results = 3
prefetch_min_score = 0.3
prefetch_total_max_chars = 1500
daily_note_max_chars = 4000
daily_notes_total_max_chars = 8000
temporal_decay_enabled = false
temporal_decay_half_life_days = 30.0
mmr_enabled = false
mmr_lambda = 0.7
vector_weight = 0.7
text_weight = 0.3

[memory.cost]
query_embedding_cache = "on"

[memory.embedding]
provider = "auto"

[memory.embedding.local]

[memory.embedding.remote.headers]

[memory.embedding.ollama]

[memory.dream]
enabled = false
interval_h = 24
max_batch_size = 20
max_iterations = 15
min_batch_size = 1
preview_mode = true
auto_schedule = false
input_slimming = "off"
memory_max_chars = 12000
candidate_file_max_chars = 4000
candidate_total_max_chars = 24000
fallback_total_max_chars = 80000

[squilla_router]
enabled = true
auto_thinking = true
rollout_phase = "full"
strategy = "v4_phase3"
default_tier = "t1"
confidence_threshold = 0.5
v4_use_aux_head = true
kv_cache_anti_downgrade_enabled = true
kv_cache_anti_downgrade_window_seconds = 600
complaint_upgrade_enabled = true
complaint_upgrade_steps = 1
complaint_upgrade_max_chars = 160
require_router_runtime = true
estimated_output_savings_pct = 0.03
upgrade_to_t3_compaction_enabled = true

[squilla_router.tiers.t0]
provider = "openrouter"
model = "deepseek/deepseek-v4-flash"
description = "S tier: fast DeepSeek V4 Flash route for trivial chat, short rewrites, extraction, and low-risk simple Q&A"
supports_image = false
thinking_level = "high"

[squilla_router.tiers.t1]
provider = "openrouter"
model = "deepseek/deepseek-v4-flash"
description = "M tier: default balanced text model for normal agent work, coding assistance, debugging, and moderate analysis"
supports_image = false
thinking_level = "high"

[squilla_router.tiers.t2]
provider = "openrouter"
model = "z-ai/glm-5.1"
description = "L tier: stronger text model for multi-step coding, structured reasoning, larger context synthesis, and harder analysis"
supports_image = false
thinking_level = "high"

[squilla_router.tiers.t3]
provider = "openrouter"
model = "anthropic/claude-opus-4.7"
description = "XL tier: highest-quality text reasoning model for difficult planning, deep review, complex debugging, and high-stakes synthesis"
supports_image = false
thinking_level = "high"

[squilla_router.tiers.image_model]
provider = "openrouter"
model = "moonshotai/kimi-k2.6"
description = "Image model: vision-capable route for user-supplied image attachments, screenshots, diagrams, and visual question answering"
supports_image = true
image_only = true
thinking_level = "medium"

[agent_token_saving]
tool_result_compression_enabled = true
