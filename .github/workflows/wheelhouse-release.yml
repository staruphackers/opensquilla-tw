name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Optional existing tag to upload artifacts to
        required: false
        default: ""
      python_runtime_release:
        description: python-build-standalone release tag
        required: true
        default: "20260414"
      python_runtime_version:
        description: Full CPython runtime version from python-build-standalone
        required: true
        default: "3.12.13"

permissions:
  contents: read

concurrency:
  group: release-assets-${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

env:
  RELEASE_PROFILE: recommended
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
  PYTHON_RUNTIME_RELEASE: ${{ github.event.inputs.python_runtime_release || '20260414' }}
  PYTHON_RUNTIME_VERSION: ${{ github.event.inputs.python_runtime_version || '3.12.13' }}

jobs:
  build-release-assets:
    name: Build Windows release assets
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Validate workflow inputs
        shell: bash
        run: |
          if [[ -n "${RELEASE_TAG}" && ! "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+.*$ ]]; then
            echo "Release tag must look like v0.2.0rc1 or v0.2.0: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ ! "${PYTHON_RUNTIME_RELEASE}" =~ ^[0-9]{8}$ ]]; then
            echo "python_runtime_release must be a YYYYMMDD python-build-standalone release tag." >&2
            exit 1
          fi
          if [[ ! "${PYTHON_RUNTIME_VERSION}" =~ ^3[.]12[.][0-9]+$ ]]; then
            echo "python_runtime_version must be a CPython 3.12 patch version." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Hydrate router assets
        shell: bash
        run: git lfs pull --include="src/opensquilla/squilla_router/models/**"

      - name: Verify router assets are hydrated
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("src/opensquilla/squilla_router/models/v4.2_phase3_inference")
          required = [
              root / "PROVENANCE.md",
              root / "artifact_manifest.json",
              root / "bge_onnx" / "model.onnx",
              root / "features" / "tfidf.pkl",
              root / "lgbm_main.bin",
              root / "mlp" / "model.onnx",
              root / "router.runtime.yaml",
          ]
          for path in required:
              assert path.is_file(), f"missing router asset: {path}"
              prefix = path.read_bytes()[:80]
              assert not prefix.startswith(b"version https://git-lfs.github.com/spec/v1"), (
                  f"Git LFS pointer file is not hydrated: {path}"
              )
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Check tag version
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        shell: bash
        run: |
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(pyproject["project"]["version"])
          PY
          )"
          tag="${RELEASE_TAG}"
          tag_version="${tag#v}"
          if [[ "${tag_version}" != "${version}" ]]; then
            echo "Tag ${tag} does not match project version ${version}" >&2
            exit 1
          fi

      - name: Test release builder
        run: uv run --extra dev pytest tests/test_scripts/test_build_wheelhouse_zip.py

      - name: Build versioned portable zip
        shell: bash
        run: |
          rm -rf dist build/wheelhouse-zip
          python scripts/build_wheelhouse_zip.py \
            --profile "${RELEASE_PROFILE}" \
            --platform-tag windows-x64 \
            --python-runtime-release "${PYTHON_RUNTIME_RELEASE}" \
            --python-runtime-version "${PYTHON_RUNTIME_VERSION}" \
            --bundle-python-runtime

      - name: Collect versioned wheel
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          wheels = sorted(Path("build/wheelhouse-zip/wheels").glob("opensquilla-*.whl"))
          assert len(wheels) == 1, f"expected one built wheel, got {len(wheels)}"
          shutil.copy2(wheels[0], Path("dist") / wheels[0].name)
          PY

      - name: Smoke versioned release artifacts
        shell: bash
        run: |
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path
          from zipfile import ZipFile

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          zips = sorted(
              path for path in Path("dist").glob("OpenSquilla-*.zip")
              if path.name != "OpenSquilla-windows-x64-portable.zip"
          )
          wheels = sorted(
              path for path in Path("dist").glob("opensquilla-*.whl")
          )
          assert len(zips) == 1, f"expected one versioned portable zip, got {len(zips)}"
          assert len(wheels) == 1, f"expected one versioned wheel, got {len(wheels)}"
          assert zips[0].name == (
              f"OpenSquilla-{version}-windows-x64-py312-recommended-portable.zip"
          )
          assert wheels[0].name == f"opensquilla-{version}-py3-none-any.whl"

          with ZipFile(zips[0]) as archive:
              names = set(archive.namelist())
              archive_roots = sorted({name.split("/", 1)[0] for name in names if "/" in name})
              assert len(archive_roots) == 1, f"expected one archive root: {archive_roots}"
              root = archive_roots[0] + "/"
              manifest = json.loads(archive.read(root + "manifest.json"))
              assert manifest["version"] == version, "manifest.version must match project version"
              assert manifest["platform_tag"] == "windows-x64"
              assert root + "LICENSE" in names
              assert root + "THIRD_PARTY_NOTICES.md" in names
              assert root + "README.md" in names
              assert root + "packages/" + manifest["wheel_name"] in names
              assert manifest["portable"] is True
              assert root + "start.sh" in names
              assert root + "start.ps1" in names
              assert root + "Start OpenSquilla.cmd" in names
              assert root + "install.sh" not in names
              assert root + "install.ps1" not in names
              assert any(name.startswith(root + "runtime/python/") for name in names)

          with ZipFile(wheels[0]) as archive:
              for info in archive.infolist():
                  if not info.filename.endswith((".bin", ".onnx", ".pkl", ".joblib")):
                      continue
                  prefix = archive.read(info)[:80]
                  assert not prefix.startswith(b"version https://git-lfs.github.com/spec/v1"), (
                      f"Git LFS pointer leaked into wheel: {info.filename}"
                  )
          PY

      - name: Create release assets
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import re
          import shutil
          import tomllib
          from pathlib import Path

          dist = Path("dist")
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = project["project"]["version"]
          is_prerelease = bool(re.search(r"(?:a|b|rc)[0-9]+$", version))
          zips = sorted(
              path for path in dist.glob("OpenSquilla-*.zip")
              if path.name != "OpenSquilla-windows-x64-portable.zip"
          )
          wheels = sorted(
              path for path in dist.glob("opensquilla-*.whl")
          )
          assert len(zips) == 1, f"expected one versioned portable zip, got {len(zips)}"
          assert len(wheels) == 1, f"expected one versioned wheel, got {len(wheels)}"
          assets = [zips[0], wheels[0]]
          if not is_prerelease:
              stable_zip = dist / "OpenSquilla-windows-x64-portable.zip"
              shutil.copy2(zips[0], stable_zip)
              assets = [zips[0], stable_zip, wheels[0]]
          lines = [
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}"
              for path in assets
          ]
          (dist / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-release-assets-windows-x64-${{ env.RELEASE_PROFILE }}
          path: |
            dist/*.zip
            dist/*.whl
            dist/SHA256SUMS

  build-desktop-macos:
    name: Build macOS Electron installer
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Hydrate router assets
        run: git lfs pull --include="src/opensquilla/squilla_router/models/**"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: |
            opensquilla-webui/package-lock.json
            desktop/electron/package-lock.json

      - name: Install Web UI dependencies
        working-directory: opensquilla-webui
        run: npm ci

      - name: Install Electron dependencies
        working-directory: desktop/electron
        run: npm ci

      - name: Build signed macOS installer
        working-directory: desktop/electron
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run build:web
          npm run build:gateway
          npm run build
          npx electron-builder --mac --publish never

      - name: Verify Electron package
        working-directory: desktop/electron
        run: npm run verify:package

      - name: Smoke packaged gateway
        working-directory: desktop/electron
        env:
          OPENSQUILLA_REQUIRE_PACKAGED_GATEWAY_SMOKE: "1"
        run: npm run verify:gateway-smoke

      - name: List macOS artifacts
        run: find dist/desktop-electron -maxdepth 2 -type f -print

      - name: Upload macOS Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-electron-macos
          path: |
            dist/desktop-electron/*.dmg
            dist/desktop-electron/*.zip
            dist/desktop-electron/*.blockmap
            dist/desktop-electron/latest-mac.yml

  build-desktop-windows:
    name: Build Windows Electron installer
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Hydrate router assets
        shell: bash
        run: git lfs pull --include="src/opensquilla/squilla_router/models/**"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: |
            opensquilla-webui/package-lock.json
            desktop/electron/package-lock.json

      - name: Install Web UI dependencies
        working-directory: opensquilla-webui
        run: npm ci

      - name: Install Electron dependencies
        working-directory: desktop/electron
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop/electron
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          npm run build:web
          npm run build:gateway
          npm run build
          npx electron-builder --win --publish never

      - name: Verify Electron package
        working-directory: desktop/electron
        run: npm run verify:package

      - name: Smoke packaged gateway
        working-directory: desktop/electron
        env:
          OPENSQUILLA_REQUIRE_PACKAGED_GATEWAY_SMOKE: "1"
        run: npm run verify:gateway-smoke

      - name: List Windows artifacts
        shell: bash
        run: find dist/desktop-electron -maxdepth 2 -type f -print

      - name: Upload Windows Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-electron-windows
          path: |
            dist/desktop-electron/*.exe
            dist/desktop-electron/*.blockmap
            dist/desktop-electron/latest.yml

  publish-release:
    name: Publish release assets
    needs:
      - build-release-assets
      - build-desktop-macos
      - build-desktop-windows
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout release notes
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: opensquilla-release-assets-windows-x64-${{ env.RELEASE_PROFILE }}
          path: dist
          merge-multiple: true

      - name: Download macOS Electron assets
        uses: actions/download-artifact@v4
        with:
          name: opensquilla-electron-macos
          path: dist

      - name: Download Windows Electron assets
        uses: actions/download-artifact@v4
        with:
          name: opensquilla-electron-windows
          path: dist

      - name: Regenerate release checksums
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          import re
          from pathlib import Path

          dist = Path("dist")
          tag = os.environ["RELEASE_TAG"]
          if tag:
              version = tag.removeprefix("v")
          else:
              wheels = sorted(dist.glob("opensquilla-*-py3-none-any.whl"))
              assert len(wheels) == 1, f"expected one wheel when RELEASE_TAG is empty, got {len(wheels)}"
              version = wheels[0].name.removeprefix("opensquilla-").removesuffix("-py3-none-any.whl")
          is_prerelease = bool(re.search(r"(?:a|b|rc)[0-9]+$", version))
          asset_names = [
              f"OpenSquilla-{version}-mac-arm64.dmg",
              f"OpenSquilla-{version}-mac-arm64.zip",
              f"OpenSquilla-{version}-mac-arm64.dmg.blockmap",
              f"OpenSquilla-{version}-mac-arm64.zip.blockmap",
              "latest-mac.yml",
              f"OpenSquilla-{version}-win-x64.exe",
              f"OpenSquilla-{version}-win-x64.exe.blockmap",
              "latest.yml",
              f"opensquilla-{version}-py3-none-any.whl",
              f"OpenSquilla-{version}-windows-x64-py312-recommended-portable.zip",
          ]
          if not is_prerelease:
              asset_names.append("OpenSquilla-windows-x64-portable.zip")
          lines = []
          for name in asset_names:
              path = dist / name
              assert path.is_file(), f"missing release asset for checksum: {name}"
              lines.append(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {name}")
          (dist / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Verify release asset set
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          import re
          from pathlib import Path

          dist = Path("dist")
          tag = os.environ["RELEASE_TAG"]
          if tag:
              version = tag.removeprefix("v")
          else:
              wheels = sorted(dist.glob("opensquilla-*-py3-none-any.whl"))
              assert len(wheels) == 1, f"expected one wheel when RELEASE_TAG is empty, got {len(wheels)}"
              version = wheels[0].name.removeprefix("opensquilla-").removesuffix("-py3-none-any.whl")
          is_prerelease = bool(re.search(r"(?:a|b|rc)[0-9]+$", version))
          sha256s = dist / "SHA256SUMS"
          asset_names = [
              f"OpenSquilla-{version}-mac-arm64.dmg",
              f"OpenSquilla-{version}-mac-arm64.zip",
              f"OpenSquilla-{version}-mac-arm64.dmg.blockmap",
              f"OpenSquilla-{version}-mac-arm64.zip.blockmap",
              "latest-mac.yml",
              f"OpenSquilla-{version}-win-x64.exe",
              f"OpenSquilla-{version}-win-x64.exe.blockmap",
              "latest.yml",
              f"opensquilla-{version}-py3-none-any.whl",
              f"OpenSquilla-{version}-windows-x64-py312-recommended-portable.zip",
          ]
          if not is_prerelease:
              asset_names.append("OpenSquilla-windows-x64-portable.zip")
          assets = [dist / name for name in asset_names]
          assert sha256s.is_file(), "missing SHA256SUMS"
          for path in assets:
              assert path.is_file(), f"missing release asset: {path.name}"
          expected = [
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}"
              for path in assets
          ]
          assert sha256s.read_text(encoding="utf-8").splitlines() == expected
          PY

      - name: Upload aggregate workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensquilla-release-assets-${{ env.RELEASE_PROFILE }}
          path: dist/*

      - name: Upload to GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          IS_PRERELEASE="$(python - <<'PY'
          import os
          import re

          tag = os.environ["TAG"]
          print("true" if re.search(r"(?:a|b|rc)[0-9]+$", tag) else "false")
          PY
          )"
          TITLE="OpenSquilla ${TAG#v}"
          NOTES_FILE="docs/releases/${TAG#v}.md"
          create_args=("${TAG}" --draft --verify-tag)
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            TITLE="$(python - <<'PY'
          import os
          import re

          version = os.environ["TAG"].removeprefix("v")
          match = re.fullmatch(r"([0-9]+[.][0-9]+[.][0-9]+)(?:a|b|rc)([0-9]+)", version)
          if match:
              print(f"OpenSquilla {match.group(1)} Preview {match.group(2)}")
          else:
              print(f"OpenSquilla {version} Preview")
          PY
          )"
            create_args+=(--prerelease)
          fi
          create_args+=(--title "${TITLE}")
          if [[ -f "${NOTES_FILE}" ]]; then
            create_args+=(--notes-file "${NOTES_FILE}")
          fi
          gh release view "${TAG}" >/dev/null 2>&1 || \
            gh release create "${create_args[@]}"
          if [[ -f "${NOTES_FILE}" ]]; then
            gh release edit "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}"
          fi
          python - <<'PY'
          import json
          import os
          import subprocess

          tag = os.environ["TAG"]
          raw = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "assets"],
              text=True,
          )
          data = json.loads(raw)
          for asset in data.get("assets", []):
              name = asset["name"]
              managed = (
                  name == "SHA256SUMS"
                  or name == "latest-mac.yml"
                  or name == "latest.yml"
                  or name.startswith("OpenSquilla-")
                  or name.startswith("opensquilla-")
                  or name.endswith(".sha256")
              )
              if managed:
                  subprocess.run(
                      ["gh", "release", "delete-asset", tag, name, "--yes"],
                      check=True,
                  )
          PY
          gh release upload "${TAG}" dist/* --clobber

      - name: Verify GitHub Release assets
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          tag = os.environ["TAG"]
          version = tag.removeprefix("v")
          is_prerelease = bool(re.search(r"(?:a|b|rc)[0-9]+$", version))
          expected = {
              f"OpenSquilla-{version}-mac-arm64.dmg",
              f"OpenSquilla-{version}-mac-arm64.zip",
              f"OpenSquilla-{version}-mac-arm64.dmg.blockmap",
              f"OpenSquilla-{version}-mac-arm64.zip.blockmap",
              "latest-mac.yml",
              f"OpenSquilla-{version}-win-x64.exe",
              f"OpenSquilla-{version}-win-x64.exe.blockmap",
              "latest.yml",
              f"opensquilla-{version}-py3-none-any.whl",
              f"OpenSquilla-{version}-windows-x64-py312-recommended-portable.zip",
              "SHA256SUMS",
          }
          if not is_prerelease:
              expected.add("OpenSquilla-windows-x64-portable.zip")
          raw = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "assets"],
              text=True,
          )
          data = json.loads(raw)
          names = {asset["name"] for asset in data.get("assets", [])}
          missing = sorted(expected - names)
          unexpected = sorted(names - expected)
          if missing or unexpected:
              print(
                  "Unexpected GitHub Release assets:",
                  {
                      "missing": missing,
                      "unexpected": unexpected,
                      "names": sorted(names),
                  },
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY
