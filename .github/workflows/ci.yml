name: CI

"on":
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENSQUILLA_TESTING: "true"

jobs:
  classify-changes:
    name: Classify changed files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      runtime_changed: ${{ steps.classify.outputs.runtime_changed }}
      test_changed: ${{ steps.classify.outputs.test_changed }}
      ci_changed: ${{ steps.classify.outputs.ci_changed }}
      dependency_changed: ${{ steps.classify.outputs.dependency_changed }}
      release_changed: ${{ steps.classify.outputs.release_changed }}
      windows_full_required: ${{ steps.classify.outputs.windows_full_required }}
      frontend_changed: ${{ steps.classify.outputs.frontend_changed }}
      tui_changed: ${{ steps.classify.outputs.tui_changed }}
      python_changed: ${{ steps.classify.outputs.python_changed }}
      platform_sensitive_changed: ${{ steps.classify.outputs.platform_sensitive_changed }}
      build_wheel_required: ${{ steps.classify.outputs.build_wheel_required }}
      full_required: ${{ steps.classify.outputs.full_required }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List changed files
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          case "${{ github.event_name }}" in
            pull_request)
              git diff --name-only \
                "${{ github.event.pull_request.base.sha }}" \
                "${{ github.event.pull_request.head.sha }}" > "${changed_files}"
              ;;
            push)
              printf '.ci/run-all\n' > "${changed_files}"
              ;;
            *)
              printf '.ci/run-all\n' > "${changed_files}"
              ;;
          esac

          echo "Changed files:"
          sed 's/^/  /' "${changed_files}"
          printf 'CHANGED_FILES=%s\n' "${changed_files}" >> "${GITHUB_ENV}"

      - name: Classify changed files
        id: classify
        shell: bash
        run: bash .github/scripts/classify-ci-changes.sh "${CHANGED_FILES}"

  workflow-lint:
    name: Validate GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color=false

  frontend-check:
    name: Frontend build and typecheck
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.frontend_changed == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: opensquilla-webui/package-lock.json

      - name: Install frontend dependencies
        working-directory: opensquilla-webui
        run: npm ci

      - name: Build frontend
        working-directory: opensquilla-webui
        run: npm run build

      - name: Verify dist exists
        run: |
          if [ ! -f "src/opensquilla/gateway/static/dist/index.html" ]; then
            echo "ERROR: Frontend dist not found"
            exit 1
          fi
          echo "Frontend dist verified"

  tui-check:
    name: OpenTUI package tests
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.tui_changed == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install OpenTUI host dependencies
        working-directory: src/opensquilla/cli/tui/opentui/package
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run OpenTUI Node tests
        working-directory: src/opensquilla/cli/tui/opentui/package
        run: npm run test

      - name: Run OpenTUI Bun tests
        working-directory: src/opensquilla/cli/tui/opentui/package
        run: bun run test:bun

  ubuntu-quality:
    name: Lint, test, and build (ubuntu-latest, 3.12)
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.python_changed == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      UV_PYTHON: "3.12"
      PYTHONPATH: ${{ github.workspace }}
      OPENSQUILLA_TURN_CALL_LOG: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: ${{ needs.classify-changes.outputs.full_required == 'true' }}

      - name: Configure runtime directories
        shell: bash
        run: |
          printf 'OPENSQUILLA_STATE_DIR=%s/opensquilla-state\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"
          printf 'OPENSQUILLA_LOG_DIR=%s/opensquilla-logs\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: uv sync --extra dev --extra recommended --extra mcp --frozen

      - name: Lint
        shell: bash
        run: uv run ruff check src tests

      - name: Type check
        shell: bash
        run: uv run mypy src/opensquilla --show-error-codes

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          markers="not llm and not live_search and not live_channel and not webui_browser and not tui_real_terminal and not local_golden and not agent_context_boundary and not llm_router_acc"

          if [[ "${{ needs.classify-changes.outputs.full_required }}" == "true" ]]; then
            uv run pytest tests -q -m "${markers}" --durations=50
          else
            uv run pytest \
              tests/unit \
              tests/test_ci \
              --ignore=tests/test_ci/test_router_artifact_manifest.py \
              tests/test_desktop/test_electron_startup_contract.py \
              tests/test_engine/test_coding_mode.py \
              tests/test_engine/test_stream_wrappers.py \
              tests/test_tools/test_shell_process_isolation.py \
              -q -m "${markers}" --durations=50
          fi

      - name: Verify metric counter names unchanged
        shell: bash
        run: |
          set -e
          for name in opensquilla_queue_depth in_flight_turns_total turn_cancellations_total queue_full_errors_total; do
            count=$(grep -c "$name" src/opensquilla/gateway/task_runtime.py || echo 0)
            if [ "$count" -lt 1 ]; then
              echo "ERROR: metric name '$name' missing from task_runtime.py"
              exit 1
            fi
          done

      - name: tracemalloc leak smoke test
        if: ${{ needs.classify-changes.outputs.full_required == 'true' }}
        shell: bash
        run: |
          uv run python -m pytest tests/test_gateway/test_task_runtime_terminal_cleanup.py::test_no_leak_under_load -v

      - name: Build wheel
        if: ${{ needs.classify-changes.outputs.build_wheel_required == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
        shell: bash
        run: uv build --wheel

  windows-compat:
    name: Windows compatibility smoke (3.12)
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.python_changed == 'true' || needs.classify-changes.outputs.platform_sensitive_changed == 'true' || needs.classify-changes.outputs.dependency_changed == 'true' || needs.classify-changes.outputs.release_changed == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 20

    env:
      UV_PYTHON: "3.12"
      PYTHONPATH: ${{ github.workspace }}
      OPENSQUILLA_TURN_CALL_LOG: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure runtime directories
        shell: bash
        run: |
          printf 'OPENSQUILLA_STATE_DIR=%s/opensquilla-state\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"
          printf 'OPENSQUILLA_LOG_DIR=%s/opensquilla-logs\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: uv sync --extra dev --extra recommended --extra mcp --frozen

      - name: Test Windows compatibility smoke
        shell: bash
        run: |
          uv run pytest \
            tests/test_artifacts.py \
            tests/test_contrib/test_codetask \
            tests/test_desktop/test_electron_startup_contract.py \
            tests/test_engine/test_coding_mode.py \
            tests/test_engine/test_stream_wrappers.py \
            tests/test_tools/test_shell_process_isolation.py \
            -q

  windows-full:
    name: Windows high-risk/full tests (conditional)
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.windows_full_required == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 20

    env:
      UV_PYTHON: "3.12"
      PYTHONPATH: ${{ github.workspace }}
      OPENSQUILLA_TURN_CALL_LOG: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: ${{ needs.classify-changes.outputs.full_required == 'true' }}

      - name: Configure runtime directories
        shell: bash
        run: |
          printf 'OPENSQUILLA_STATE_DIR=%s/opensquilla-state\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"
          printf 'OPENSQUILLA_LOG_DIR=%s/opensquilla-logs\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Bun
        if: ${{ needs.classify-changes.outputs.tui_changed == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install OpenTUI host dependencies
        if: ${{ needs.classify-changes.outputs.tui_changed == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
        shell: bash
        run: bun install --frozen-lockfile --cwd=src/opensquilla/cli/tui/opentui/package

      - name: Install dependencies
        shell: bash
        run: uv sync --extra dev --extra recommended --extra mcp --frozen

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          markers="not llm and not live_search and not live_channel and not webui_browser and not tui_real_terminal and not local_golden and not agent_context_boundary and not llm_router_acc"

          if [[ "${{ needs.classify-changes.outputs.full_required }}" == "true" ]]; then
            uv run pytest tests -q -m "${markers}" --durations=50
          else
            uv run pytest \
              tests/test_artifacts.py \
              tests/test_compat \
              tests/test_desktop \
              tests/test_sandbox \
              tests/test_tools/test_path_aliases.py \
              tests/test_tools/test_path_policy.py \
              tests/test_tools/test_shell_approval_policy.py \
              tests/test_tools/test_shell_background_seatbelt.py \
              tests/test_tools/test_shell_policy_windows.py \
              tests/test_tools/test_shell_process_isolation.py \
              -q -m "${markers}" --durations=50
          fi

  release-packaging:
    name: Release packaging contracts
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.release_changed == 'true' || needs.classify-changes.outputs.full_required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      UV_PYTHON: "3.12"
      PYTHONPATH: ${{ github.workspace }}
      OPENSQUILLA_TURN_CALL_LOG: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: uv sync --extra dev --extra recommended --extra mcp --frozen

      - name: Run release packaging contract tests
        shell: bash
        run: |
          uv run pytest \
            tests/test_scripts/test_build_wheelhouse_zip.py \
            tests/test_install_scripts.py \
            tests/test_root_start_scripts.py \
            tests/test_release_consistency.py \
            tests/test_public_release_hygiene.py \
            -q

  ci-result:
    name: CI result
    needs:
      - classify-changes
      - workflow-lint
      - frontend-check
      - tui-check
      - ubuntu-quality
      - windows-compat
      - windows-full
      - release-packaging
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required CI results
        shell: bash
        run: |
          set -euo pipefail

          classify_result="${{ needs.classify-changes.result }}"
          workflow_lint_result="${{ needs.workflow-lint.result }}"
          frontend_result="${{ needs.frontend-check.result }}"
          tui_result="${{ needs.tui-check.result }}"
          ubuntu_result="${{ needs.ubuntu-quality.result }}"
          windows_smoke_result="${{ needs.windows-compat.result }}"
          windows_full_result="${{ needs.windows-full.result }}"
          release_result="${{ needs.release-packaging.result }}"
          docs_only="${{ needs.classify-changes.outputs.docs_only }}"
          runtime_changed="${{ needs.classify-changes.outputs.runtime_changed }}"
          test_changed="${{ needs.classify-changes.outputs.test_changed }}"
          ci_changed="${{ needs.classify-changes.outputs.ci_changed }}"
          dependency_changed="${{ needs.classify-changes.outputs.dependency_changed }}"
          release_changed="${{ needs.classify-changes.outputs.release_changed }}"
          windows_full_required="${{ needs.classify-changes.outputs.windows_full_required }}"
          frontend_changed="${{ needs.classify-changes.outputs.frontend_changed }}"
          tui_changed="${{ needs.classify-changes.outputs.tui_changed }}"
          python_changed="${{ needs.classify-changes.outputs.python_changed }}"
          platform_sensitive_changed="${{ needs.classify-changes.outputs.platform_sensitive_changed }}"
          build_wheel_required="${{ needs.classify-changes.outputs.build_wheel_required }}"
          full_required="${{ needs.classify-changes.outputs.full_required }}"

          require_success() {
            local result="$1"
            local label="$2"
            if [[ "${result}" != "success" ]]; then
              echo "${label} must succeed."
              exit 1
            fi
          }

          allow_success_or_skipped() {
            local result="$1"
            local label="$2"
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "${label} must not fail."
              exit 1
            fi
          }

          printf 'classify-changes: %s\n' "${classify_result}"
          printf 'workflow-lint: %s\n' "${workflow_lint_result}"
          printf 'frontend-check: %s\n' "${frontend_result}"
          printf 'tui-check: %s\n' "${tui_result}"
          printf 'ubuntu-quality: %s\n' "${ubuntu_result}"
          printf 'windows-compat-smoke: %s\n' "${windows_smoke_result}"
          printf 'windows-full: %s\n' "${windows_full_result}"
          printf 'release-packaging: %s\n' "${release_result}"
          printf 'docs_only=%s runtime_changed=%s test_changed=%s ci_changed=%s dependency_changed=%s release_changed=%s windows_full_required=%s frontend_changed=%s tui_changed=%s python_changed=%s platform_sensitive_changed=%s build_wheel_required=%s full_required=%s\n' \
            "${docs_only}" "${runtime_changed}" "${test_changed}" "${ci_changed}" "${dependency_changed}" "${release_changed}" "${windows_full_required}" "${frontend_changed}" "${tui_changed}" "${python_changed}" "${platform_sensitive_changed}" "${build_wheel_required}" "${full_required}"

          require_success "${classify_result}" "Classify changed files"
          require_success "${workflow_lint_result}" "Workflow lint"

          if [[ "${frontend_changed}" == "true" || "${full_required}" == "true" ]]; then
            require_success "${frontend_result}" "Frontend build and typecheck"
          else
            allow_success_or_skipped "${frontend_result}" "Frontend build and typecheck"
          fi

          if [[ "${tui_changed}" == "true" || "${full_required}" == "true" ]]; then
            require_success "${tui_result}" "OpenTUI package tests"
          else
            allow_success_or_skipped "${tui_result}" "OpenTUI package tests"
          fi

          if [[ "${python_changed}" == "true" || "${full_required}" == "true" ]]; then
            require_success "${ubuntu_result}" "Ubuntu quality gate"
          else
            allow_success_or_skipped "${ubuntu_result}" "Ubuntu quality gate"
          fi

          if [[ "${python_changed}" == "true" || "${platform_sensitive_changed}" == "true" || "${dependency_changed}" == "true" || "${release_changed}" == "true" || "${full_required}" == "true" ]]; then
            require_success "${windows_smoke_result}" "Windows compatibility smoke tests"
          else
            allow_success_or_skipped "${windows_smoke_result}" "Windows compatibility smoke tests"
          fi

          if [[ "${windows_full_required}" == "true" || "${full_required}" == "true" ]]; then
            require_success "${windows_full_result}" "Windows full test suite"
          else
            allow_success_or_skipped "${windows_full_result}" "Windows full test suite"
          fi

          if [[ "${release_changed}" == "true" || "${full_required}" == "true" ]]; then
            require_success "${release_result}" "Release packaging contracts"
          else
            allow_success_or_skipped "${release_result}" "Release packaging contracts"
          fi
