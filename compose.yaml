services:
  gateway:
    image: ${OPENSQUILLA_GATEWAY_IMAGE:-opensquilla:local}
    environment:
      OPENSQUILLA_LISTEN: "0.0.0.0"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      TZ: ${TZ:-UTC}
    volumes:
      # POSIX: $HOME/.opensquilla.
      # Windows: set OPENSQUILLA_HOST_HOME=C:\Users\<you> before `docker compose up`,
      # or use WSL2 with $HOME naturally.
      - ${OPENSQUILLA_HOST_HOME:-${HOME}}/.opensquilla:/root/.opensquilla
    ports:
      - "127.0.0.1:18790:18790"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://127.0.0.1:18790/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
