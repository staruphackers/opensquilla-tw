# --- capability ladder migration (transcribed from get_capabilities) ---
#
# Rows below carry the per-provider capability ladder that used to live as
# code branches in ModelCatalog.get_capabilities (model_catalog.py). Each
# row is a verbatim transcription of one prefix rule; the trailing "*" row
# per provider transcribes that branch's fall-through (the branch returned
# for EVERY model of its provider, so the catch-all is part of the ladder,
# not an invention — it deliberately shadows snapshot capability data the
# ladder never consulted).
#
# ORDER MATTERS: the corrections loader consults the exact model key first,
# then every other key as an fnmatch glob IN FILE ORDER, each filling only
# fields still unset. More specific prefixes therefore appear before the
# general ones (qwen3.5* before qwen3*), and the "*" catch-all is last.
#
# NOT transcribed, on purpose (host trust stays code in get_capabilities):
# - the deepseek-in-base_url sniff for provider "openai";
# - the api.openai.com host guard with its gpt-5/o1/o3/o4 prefix set. A
#   corrections row is keyed by (provider, model) only and cannot express
#   "openai dialect at this host, snapshot capabilities elsewhere" — an
#   [openai."gpt-5*"] row would grant the openai reasoning dialect (and the
#   wrong vision flag) to arbitrary proxy base URLs.

