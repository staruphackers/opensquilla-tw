# catalog_overrides.toml — packaged metadata corrections for the layered
# model catalog (see src/opensquilla/provider/model_catalog.py).
#
# Authority order (highest first): user overrides > live provider catalog >
# THIS FILE (corrections) > models.dev snapshot > synthesized fallback.
# Merging is per FIELD: a correction fills only fields the higher layers
# left unset, and is itself overridden field-by-field the same way.
#
# Schema — one TOML table per (provider, model-or-glob) pair:
#
#   [<provider>."<model-or-glob>"]
#   display_name = "…"               # str: display_name, family,
#   reasoning_format = "deepseek"    #      reasoning_format, release_date, status
#   context_window = 262144          # int: context_window, max_output_tokens
#   max_output_tokens = 32768
#   supports_reasoning = true        # bool: supports_reasoning, supports_tools,
#   supports_vision = false          #       supports_vision (real booleans only)
#   input_cost_per_mtok = 2.5        # float, USD per MILLION tokens:
#   output_cost_per_mtok = 10.0      #   input/output/cache_read/cache_write
#   cache_read_cost_per_mtok = 0.25  #   _cost_per_mtok, quality_prior
#   quality_prior = 0.7
#
# Keys:
# - <provider> is the lowercased provider id from the provider registry
#   (e.g. "openrouter", "deepseek", "zhipu"). Corrections apply only when the
#   caller resolves with that provider; there is no cross-provider table.
# - "<model-or-glob>" is compared against the lowercased model id. An exact
#   key is consulted first; every other key in the provider table is then
#   tried as an fnmatch glob (e.g. "glm-5*", "doubao-seed-1-6-*") in file
#   order, each filling only fields still unset within this layer.
# - Field names must match ModelCatalogEntry data fields
#   (src/opensquilla/provider/catalog_types.py); unknown names or wrongly
#   typed values are logged and ignored — a bad row degrades, never crashes.
#
# Data rows follow — this file started bootstrapped-empty so per-model fixes
# land here as data instead of as code branches.

# --- window/pricing corrections (canonical budget/pricing rows) ---
#
# These rows were originally copied from two in-repo static tables —
# _STATIC_FALLBACK in src/opensquilla/provider/model_catalog.py (tuples of
# (max_output_tokens, context_window)) and _KNOWN_MODELS in
# src/opensquilla/provider/anthropic.py. Both tables have since been RETIRED
# and deleted; the rows below are now the canonical source of this data.
#
# Besides resolve_entry's provider-scoped corrections layer, the legacy
# token-budget paths (resolve_max_tokens / resolve_context_window in
# model_catalog.py) consult exact (non-glob) rows carrying
# context_window/max_output_tokens PROVIDER-AGNOSTICALLY by basename via
# _corrections_budget_fallback — the slot the retired static table occupied,
# below the live catalog and the models.dev snapshot. Keep budget rows
# conservative: over-estimating a window causes silent server-side
# truncation; under-estimating only triggers compaction earlier.

[moonshot."moonshot-v1-8k"]
context_window = 8192
max_output_tokens = 8192

[moonshot."moonshot-v1-32k"]
context_window = 32768
max_output_tokens = 32768

[moonshot."moonshot-v1-128k"]
context_window = 131072
max_output_tokens = 131072

