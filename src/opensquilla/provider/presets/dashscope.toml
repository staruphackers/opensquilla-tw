# Packaged SquillaRouter tier preset. Loaded by
# opensquilla.provider.preset_registry; tier data is a stable contract
# consumed by gateway config validation and must round-trip exactly.
[preset]
id = "dashscope"
provider = "dashscope"
label = "Aliyun DashScope"
description = "Curated Aliyun DashScope router tier ladder (c0-c3)."
default_model = "qwen3.6-plus"

[tiers.c0]
provider = "dashscope"
model = "qwen3.6-flash"
description = "DashScope fast route: Qwen3.6 Flash for simple text tasks; pending live smoke."
supports_image = false

[tiers.c1]
provider = "dashscope"
model = "qwen3.6-plus"
description = "DashScope balanced route: Qwen3.6 Plus for normal agent and coding work; pending live smoke."
supports_image = false

[tiers.c2]
provider = "dashscope"
model = "qwen3-max"
description = "DashScope strong route: Qwen3 Max for complex text tasks."
supports_image = false

[tiers.c3]
provider = "dashscope"
model = "qwen3-max"
description = "DashScope highest route: Qwen3 Max; higher-thinking behavior requires future payload support."
supports_image = false
