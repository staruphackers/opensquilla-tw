# Packaged SquillaRouter tier preset. Loaded by
# opensquilla.provider.preset_registry; tier data is a stable contract
# consumed by gateway config validation and must round-trip exactly.
[preset]
id = "moonshot"
provider = "moonshot"
label = "Moonshot AI"
description = "Curated Moonshot AI router tier ladder (c0-c3)."
default_model = "kimi-k2.6"

[tiers.c0]
provider = "moonshot"
model = "kimi-k2.6"
description = "Moonshot fast route: Kimi K2.6 for cost-efficient multimodal agent work with 256K context."
thinking_level = "low"
supports_image = true

[tiers.c1]
provider = "moonshot"
model = "kimi-k2.6"
description = "Moonshot balanced route: Kimi K2.6 for normal multimodal agent work."
thinking_level = "medium"
supports_image = true

[tiers.c2]
provider = "moonshot"
model = "kimi-k2.6"
description = "Moonshot strong route: Kimi K2.6 for complex coding, reasoning, and multimodal tasks."
thinking_level = "medium"
supports_image = true

[tiers.c3]
provider = "moonshot"
model = "kimi-k2.7-code"
description = "Moonshot highest route: Kimi K2.7 Code for the hardest coding and long-horizon agent routes."
thinking_level = "high"
supports_image = true
