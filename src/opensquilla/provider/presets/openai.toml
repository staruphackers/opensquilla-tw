# Packaged SquillaRouter tier preset. Loaded by
# opensquilla.provider.preset_registry; tier data is a stable contract
# consumed by gateway config validation and must round-trip exactly.
[preset]
id = "openai"
provider = "openai"
label = "OpenAI"
description = "Curated OpenAI router tier ladder (c0-c3)."
default_model = "gpt-5.4-mini"

[tiers.c0]
provider = "openai"
model = "gpt-5.4-nano"
description = "OpenAI fast route: GPT-5.4 Nano for simple and low-latency work."
thinking_level = "none"
supports_image = false

[tiers.c1]
provider = "openai"
model = "gpt-5.4-mini"
description = "OpenAI balanced route: GPT-5.4 Mini for normal agent work."
thinking_level = "low"
supports_image = false

[tiers.c2]
provider = "openai"
model = "gpt-5.5"
description = "OpenAI strong route: GPT-5.5 for complex text tasks."
thinking_level = "medium"
supports_image = false

[tiers.c3]
provider = "openai"
model = "gpt-5.5"
description = "OpenAI highest route: GPT-5.5 for harder analysis and review."
thinking_level = "high"
supports_image = false
