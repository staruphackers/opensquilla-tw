# Packaged SquillaRouter tier preset. Loaded by
# opensquilla.provider.preset_registry; tier data is a stable contract
# consumed by gateway config validation and must round-trip exactly.
[preset]
id = "openrouter"
provider = "openrouter"
label = "OpenRouter"
description = "Curated OpenRouter mixed-model router ladder; the built-in default, including the packaged image tier."
default_model = "deepseek/deepseek-v4-pro"

[tiers.c0]
provider = "openrouter"
model = "deepseek/deepseek-v4-flash"
description = "fast DeepSeek V4 Flash route for trivial chat, short rewrites, extraction, and low-risk simple Q&A"
thinking_level = "high"
supports_image = false

[tiers.c1]
provider = "openrouter"
model = "deepseek/deepseek-v4-pro"
description = "default balanced text model for normal agent work, coding assistance, debugging, and moderate analysis"
thinking_level = "high"
supports_image = false

[tiers.c2]
provider = "openrouter"
model = "z-ai/glm-5.2"
description = "stronger GLM 5.2 route for multi-step coding, structured reasoning, larger context synthesis, and harder analysis"
thinking_level = "high"
supports_image = false

[tiers.c3]
provider = "openrouter"
model = "anthropic/claude-opus-4.8"
description = "Highest-tier Claude Opus 4.8 route for difficult planning, deep review, complex debugging, and high-stakes synthesis"
thinking_level = "high"
supports_image = false

[tiers.image_model]
provider = "openrouter"
model = "moonshotai/kimi-k2.6"
description = "Image model: vision-capable route for user-supplied image attachments, screenshots, diagrams, and visual question answering"
thinking_level = "medium"
supports_image = true
image_only = true
