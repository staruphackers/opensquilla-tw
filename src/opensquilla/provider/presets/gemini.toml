# Packaged SquillaRouter tier preset. Loaded by
# opensquilla.provider.preset_registry; tier data is a stable contract
# consumed by gateway config validation and must round-trip exactly.
[preset]
id = "gemini"
provider = "gemini"
label = "Google Gemini"
description = "Curated Google Gemini router tier ladder (c0-c3)."
default_model = "gemini-2.5-flash"

[tiers.c0]
provider = "gemini"
model = "gemini-2.5-flash-lite"
description = "Gemini fast route: 2.5 Flash-Lite for low-latency tasks."
supports_image = false

[tiers.c1]
provider = "gemini"
model = "gemini-2.5-flash"
description = "Gemini balanced route: 2.5 Flash for normal agent work."
thinking_level = "low"
supports_image = false

[tiers.c2]
provider = "gemini"
model = "gemini-2.5-pro"
description = "Gemini strong route: 2.5 Pro for complex coding and reasoning."
thinking_level = "medium"
supports_image = false

[tiers.c3]
provider = "gemini"
model = "gemini-2.5-pro"
description = "Gemini highest route: 2.5 Pro with high thinking; 3.1 preview remains opt-in."
thinking_level = "high"
supports_image = false
