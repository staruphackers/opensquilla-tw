# Packaged SquillaRouter tier preset. Loaded by
# opensquilla.provider.preset_registry; tier data is a stable contract
# consumed by gateway config validation and must round-trip exactly.
[preset]
id = "zhipu"
provider = "zhipu"
label = "Zhipu (Z.AI)"
description = "Curated Zhipu (Z.AI) router tier ladder (c0-c3)."
default_model = "glm-5"

[tiers.c0]
provider = "zhipu"
model = "glm-5-turbo"
description = "Zhipu fast route: GLM-5-Turbo for simple text tasks."
supports_image = false

[tiers.c1]
provider = "zhipu"
model = "glm-5"
description = "Zhipu balanced route: GLM-5 for normal agent work."
