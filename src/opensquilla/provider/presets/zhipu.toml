supports_image = false

[tiers.c2]
provider = "zhipu"
model = "glm-5.1"
description = "Zhipu strong route: GLM-5.1 for complex text tasks."
thinking_level = "medium"
supports_image = false

[tiers.c3]
provider = "zhipu"
model = "glm-5.2"
description = "Zhipu highest route: GLM-5.2 with high reasoning effort for hardest coding and long-context routes."
thinking_level = "high"
supports_image = false
