<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OpenSquilla Control</title>
    <link rel="icon" href="{{ base_path }}/static/img/opensquilla-mark.png?v={{ version }}" type="image/png">
    <link rel="shortcut icon" href="{{ base_path }}/static/img/opensquilla-mark.png?v={{ version }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ base_path }}/static/img/opensquilla-mark.png?v={{ version }}">
    <!-- Theme + locale flash prevention: applies the saved choice before the
         bundle loads. Locale falls back to the server-rendered <html lang>. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('opensquilla-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
        try {
          var l = localStorage.getItem('opensquilla-locale');
          if (l === 'en' || l === 'zh-Hans') {
            document.documentElement.setAttribute('lang', l);
          }
        } catch (e) { /* keep server-rendered lang */ }
      })();
    </script>
    {% if link_token %}
    <!-- Direct operator links seed the gateway connection before the app boots. -->
    <script>
      (function () {
        try {
          function clearOpenSquillaStorage(storage) {
            for (var i = storage.length - 1; i >= 0; i -= 1) {
              var key = storage.key(i);
              if (key && key.indexOf('opensquilla.') === 0) storage.removeItem(key);
            }
          }
          var token = {{ link_token | tojson | safe }};
          var wsUrl = {{ ws_url | tojson | safe }};
          clearOpenSquillaStorage(localStorage);
          clearOpenSquillaStorage(sessionStorage);
          if (wsUrl) localStorage.setItem('opensquilla.wsUrl', wsUrl);
          if (token) sessionStorage.setItem('opensquilla.wsToken', token);
          if (window.history && window.history.replaceState) {
            var url = new URL(window.location.href);
            url.searchParams.delete('token');
            window.history.replaceState(null, '', url.pathname + url.search + url.hash);
          }
        } catch (e) { /* connection settings stay editable in the UI */ }
      })();
    </script>
    {% endif %}
    <!-- Vite build output (hashed filenames, read dynamically from dist/) -->
    {% for css in vite_css_urls %}<link rel="stylesheet" crossorigin href="{{ css }}">
    {% endfor %}
    {% if vite_js_url %}<script type="module" crossorigin src="{{ vite_js_url }}"></script>{% endif %}
</head>
<body>
    <noscript>
        <div style="padding:2rem;font-family:system-ui,-apple-system,sans-serif;color:#333;background:#fff;max-width:560px;margin:2rem auto;border:1px solid #ddd;border-radius:8px">
            <h2 style="margin:0 0 .5rem">JavaScript required</h2>
            <p style="margin:0;color:#555">OpenSquilla Control needs JavaScript to render the chat, sessions, and configuration views. Please enable it in your browser to continue.</p>
        </div>
    </noscript>
    <div id="app"></div>

    <!-- Bootstrap data injected by Jinja2 -->
    <div id="opensquilla-data"
         data-version="{{ version }}"
         data-ws-url="{{ ws_url }}"
         data-auth-mode="{{ auth_mode }}"
         data-base-path="{{ base_path }}"
         data-config-path="{{ config_path }}"
         data-locale="{{ locale }}"
         data-update="{{ update | tojson | forceescape }}"
         style="display:none"></div>

    <!-- Prism syntax highlighting (used by ChatView for code blocks) -->
    <script src="{{ base_path }}/static/vendor/prism-core.min.js"></script>
    <script src="{{ base_path }}/static/vendor/prism-autoloader.min.js"></script>
    <script>if(window.Prism&&Prism.plugins.autoloader){Prism.plugins.autoloader.languages_path='{{ base_path }}/static/vendor/prism-langs/';}</script>
</body>
</html>
