# OpenSquilla agent RUN-POLICY template for the code-task host real-repo solver.
#
# Loaded by LocalAdapter via OPENSQUILLA_GATEWAY_CONFIG_PATH (which REPLACES
# the normal config chain) so the code-task agent runs with a focused tool
# set: coding-irrelevant tools are denied (like the SWE-bench adapter) BUT
# network stays enabled — code-task legitimately reads docs and installs
# dependencies.
#
# Provider selection does NOT live here: the operator's own provider stack
# ([llm], [squilla_router], [llm_profiles], [models], [model_catalog]) is
# carried into the per-run config by contrib/codetask/agent_config.py, so the
# subagent uses the same provider, model, credentials, and router tiers as
# every other surface. Adding an [llm] or [squilla_router] section here would
# pin the subagent to it and shadow the operator's env config — don't.

workspace_strict = false

[sandbox]
# code-task runs on the host against a TRUSTED repo; no double sandbox.
sandbox = false
security_grading = false

[tools]
# Deny tools irrelevant to a single isolated coding run (fnmatch selectors).
# NETWORK (web*) is intentionally KEPT — code-task needs it for docs/deps.
deny = [
  # NETWORK IS KEPT (no group:web) — code-task needs web_search/web_fetch/
  # http_request to read docs and install dependencies.
  # Persistent / cross-session memory tools — we want :memory: only.
  "memory*",
  # Inter-session / multi-agent orchestration — single isolated run.
  "session*",
  "agents*",
  "subagents",
  "nodes",
  # Scheduling.
  "cron",
  # Channel / messaging tools have no inbox here.
  "messag*",
  # Image / media / audio generation is irrelevant to coding.
  "image*", "tts", "music*", "song*", "voice*", "dubbing*", "audio*",
  # Code-irrelevant for a single isolated coding/build run (codex-reviewed):
  # Feishu/Lark, gateway control, skill mutation/search + skill-dep install
  # (real leak: runs brew/node/uv install specs), doc/media generation,
  # meta-invoke, artifact publishing, manual router control.
  "feishu_*", "gateway", "skill_*", "install_skill_deps",
  "create_*", "pdf", "canvas", "read_spreadsheet", "meta_invoke",
  "publish_artifact", "router_control",
]
# RFC2544 fake-IP DNS pass-through. Mainland-China ISPs (Beijing Telecom etc.)
# transparently rewrite DNS for graylisted domains like github.com to
# 198.18.x.x and route the traffic through their filtering infrastructure.
# Without this, opensquilla's SSRF guard rejects those addresses as "reserved"
# and the code-task sub-agent cannot reach github / npm / pypi via web_fetch,
# forcing 15-20 http_request fallbacks that bloat context. The outer gateway
# already trusts this CIDR via the user's own config; mirror it here so the
# isolated subprocess sees the same network reality.
trusted_fake_ip_cidrs = ["198.18.0.0/15"]

[meta_skill]
# Disable model-visible meta-skill resolution for the code-task subprocess.
# code-task spawns a focused sub-agent whose sole job is to edit a real repo
# and pass acceptance tests — letting the semantic meta-router redirect that
# turn into meta-paper-write (or any other research/writing skill) wastes the
# whole run on the wrong workflow. The outer gateway keeps its own meta_skill
# setting; only this isolated subprocess is gated.
enabled = false

[memory]
flush_enabled = false
