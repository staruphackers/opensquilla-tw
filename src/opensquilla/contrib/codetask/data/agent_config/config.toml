# OpenSquilla agent config for the code-task host real-repo solver.
#
# Loaded by LocalAdapter via OPENSQUILLA_GATEWAY_CONFIG_PATH so the code-task
# agent runs with a focused tool set: coding-irrelevant tools are denied (like
# the SWE-bench adapter) BUT network stays enabled — code-task legitimately
# reads docs and installs dependencies — and the squilla_router stays ON so the
# model is picked per task.

workspace_strict = false

[llm]
provider = "openrouter"
model = "deepseek/deepseek-v4-pro"            # fallback only; router decides per task
base_url = "https://openrouter.ai/api/v1"
# api_key comes from $OPENROUTER_API_KEY (inherited env).
max_tokens = 32768

[squilla_router]
enabled = true                                # v4_phase3 by default; router self-decides

[sandbox]
# code-task runs on the host against a TRUSTED repo; no double sandbox.
sandbox = false
security_grading = false

[tools]
# Deny tools irrelevant to a single isolated coding run (fnmatch selectors).
# NETWORK (web*) is intentionally KEPT — code-task needs it for docs/deps.
deny = [
  # NETWORK IS KEPT (no group:web) — code-task needs web_search/web_fetch/
  # http_request to read docs and install dependencies.
  # Persistent / cross-session memory tools — we want :memory: only.
  "memory*",
  # Inter-session / multi-agent orchestration — single isolated run.
  "session*",
  "agents*",
  "subagents",
  "nodes",
  # Scheduling.
  "cron",
  # Channel / messaging tools have no inbox here.
  "messag*",
  # Image / media / audio generation is irrelevant to coding.
  "image*", "tts", "music*", "song*", "voice*", "dubbing*", "audio*",
]

[memory]
flush_enabled = false
